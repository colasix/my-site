<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f3f4f6"/>

  <!-- Decorative circles in background -->
  <circle cx="100" cy="80" r="40" fill="#9CA3AF" opacity="0.1"/>
  <circle cx="700" cy="420" r="50" fill="#9CA3AF" opacity="0.1"/>

  <!-- Main chart area background -->
  <rect x="200" y="150" width="400" height="250" rx="12" fill="white" opacity="0.5"/>

  <!-- Grid lines (subtle) -->
  <line x1="220" y1="240" x2="580" y2="240" stroke="#9CA3AF" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="290" x2="580" y2="290" stroke="#9CA3AF" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="340" x2="580" y2="340" stroke="#9CA3AF" stroke-width="1" opacity="0.3"/>

  <!-- Y-axis -->
  <line x1="220" y1="150" x2="220" y2="340" stroke="#2F4F4F" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="220" y1="340" x2="580" y2="340" stroke="#2F4F4F" stroke-width="2"/>

  <!-- Declining line chart -->
  <polyline points="240,200 310,180 380,220 450,260 520,300"
            stroke="#2F4F4F" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points on line -->
  <circle cx="240" cy="200" r="5" fill="#2F4F4F"/>
  <circle cx="310" cy="180" r="5" fill="#2F4F4F"/>
  <circle cx="380" cy="220" r="5" fill="#2F4F4F"/>
  <circle cx="450" cy="260" r="5" fill="#2F4F4F"/>
  <circle cx="520" cy="300" r="5" fill="#2F4F4F"/>

  <!-- Axis labels -->
  <text x="200" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#2F4F4F" opacity="0.6">Jan</text>
  <text x="310" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#2F4F4F" opacity="0.6">Mar</text>
  <text x="420" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#2F4F4F" opacity="0.6">May</text>
  <text x="530" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#2F4F4F" opacity="0.6">Jul</text>

  <!-- Title -->
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#2F4F4F" text-anchor="middle">Traffic Analytics</text>
</svg>