<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f3f4f6"/>

  <!-- Decorative circles in background -->
  <circle cx="100" cy="100" r="50" fill="#9CA3AF" opacity="0.08"/>
  <circle cx="700" cy="400" r="55" fill="#9CA3AF" opacity="0.08"/>

  <!-- Left document stack -->
  <g>
    <!-- Back document -->
    <rect x="160" y="240" width="120" height="160" rx="8" fill="#9CA3AF" opacity="0.3"/>

    <!-- Middle document -->
    <rect x="180" y="220" width="120" height="160" rx="8" fill="#9CA3AF" opacity="0.5"/>

    <!-- Front document -->
    <rect x="200" y="200" width="120" height="160" rx="8" fill="white" stroke="#2F4F4F" stroke-width="2"/>

    <!-- Document lines (text representation) -->
    <line x1="220" y1="240" x2="300" y2="240" stroke="#9CA3AF" stroke-width="2" opacity="0.6"/>
    <line x1="220" y1="265" x2="290" y2="265" stroke="#9CA3AF" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="285" x2="290" y2="285" stroke="#9CA3AF" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="305" x2="280" y2="305" stroke="#9CA3AF" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="325" x2="290" y2="325" stroke="#9CA3AF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Crown on right side -->
  <g>
    <!-- Crown base -->
    <rect x="440" y="280" width="140" height="30" rx="4" fill="#2F4F4F" opacity="0.8"/>

    <!-- Crown jewels (points) -->
    <!-- Center point (tallest) -->
    <polygon points="510,280 495,200 525,200" fill="#2F4F4F"/>
    <circle cx="510" cy="200" r="8" fill="#9CA3AF"/>

    <!-- Left point -->
    <polygon points="450,280 435,240 465,240" fill="#2F4F4F" opacity="0.9"/>
    <circle cx="450" cy="240" r="6" fill="#9CA3AF" opacity="0.8"/>

    <!-- Right point -->
    <polygon points="570,280 555,240 585,240" fill="#2F4F4F" opacity="0.9"/>
    <circle cx="570" cy="240" r="6" fill="#9CA3AF" opacity="0.8"/>

    <!-- Small accent points -->
    <polygon points="430,280 422,250 438,250" fill="#2F4F4F" opacity="0.7"/>
    <polygon points="590,280 582,250 598,250" fill="#2F4F4F" opacity="0.7"/>

    <!-- Crown shine effect -->
    <ellipse cx="510" cy="295" rx="50" ry="8" fill="#9CA3AF" opacity="0.3"/>
  </g>

  <!-- Connection line from document to crown -->
  <path d="M 320 270 Q 380 260 440 270" stroke="#9CA3AF" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,5"/>

  <!-- Accent stars/points for emphasis -->
  <g opacity="0.6">
    <circle cx="360" cy="150" r="4" fill="#2F4F4F"/>
    <circle cx="420" cy="140" r="3" fill="#9CA3AF"/>
    <circle cx="620" cy="160" r="3.5" fill="#2F4F4F"/>
  </g>

  <!-- Title -->
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#2F4F4F" text-anchor="middle">Content Authority</text>
</svg>